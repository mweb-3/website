<!DOCTYPE html>
<html lang="en">
<head>
    <title>delta</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:site_name" content="delta">
    <meta property="twitter:site" content="@7Amg">
    <meta property="og:title" content="delta">
    <meta property="og:image:height" content="967">
</head>
<style>
    body {
        margin: 0;
        overflow: hidden;
    }

    #outer {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100dvh;
        gap: 2rem;
        flex-wrap: wrap;
        padding: 1rem;
        box-sizing: border-box;
    }

    #video {
        width: min(50vh, 45vw);
        flex-shrink: 0;
    }

    .child {
        display: flex;
        justify-content: center;
        align-items: center;
    }

    pre {
        margin: 0;
        font-size: clamp(0.75rem, 2.5vw, 1rem);
        white-space: pre;
        overflow: visible;
    }

    .pointer {
        cursor: pointer;
    }

    a {
        color: black;
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
        cursor: pointer;
    }

    /* Mobile: stack vertically, shrink video */
    @media (max-width: 600px) {
        body {
            overflow: auto;
        }

        #outer {
            flex-direction: column;
            gap: 1.5rem;
            height: auto;
            min-height: 100dvh;
            padding: 2rem 1rem;
        }

        #video {
            width: min(80vw, 300px);
        }

        pre {
            font-size: clamp(0.7rem, 3.5vw, 0.9rem);
        }
    }

    /* Short screens: keep side by side but shrink video */
    @media (max-height: 500px) {
        #video {
            width: min(40vh, 35vw);
        }
    }
</style>

<body>
<div id="outer">
    <div class="child">
        <pre>
# delta

cryptocurrency, aviation, finance

<a href="https://github.com/mweb-3">github</a>
<a href="https://x.com/7Amg">x</a>
<a href="https://t.me/@sevenamgs">telegram</a>

<a id="email">7@alo[.]ne</a>
        </pre>
    </div>
    <video id="video" class="pointer" src="/static/f16.webm" autoplay muted loop playsinline></video>
    <audio id="audio" autoplay>
        <source src="/static/relax.mp3" type="audio/mpeg">
    </audio>
</div>
</body>
<script>
    const audio = document.getElementById('audio');
    const btn = document.getElementById('video');
    const email = document.getElementById('email');

    btn.addEventListener('click', () => {
        audio.play();
        btn.classList.remove('pointer');
    });

    email.addEventListener('click', async () => {
        await navigator.clipboard.writeText("7@alo.ne");
        email.textContent = 'copied to clipboard';
        setTimeout(() => {
            email.textContent = '7@alo[.]ne';
        }, 2000);
    });
</script>
</html>
